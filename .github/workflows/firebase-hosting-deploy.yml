name: Deploy to Firebase Hosting (live)

# Runs when code lands on master — i.e. when a PR is approved & merged.
on:
  push:
    branches: [master]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        # Firebase web config values are public (shipped in the client bundle),
        # so they are safe to keep here for the production build.
        env:
          VITE_FIREBASE_API_KEY: AIzaSyDteBMmEGPqHZdD3ovFPkD73aZ-OkNc2xo
          VITE_FIREBASE_AUTH_DOMAIN: church-app-ec927.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: church-app-ec927
          VITE_FIREBASE_STORAGE_BUCKET: church-app-ec927.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "1041749808643"
          VITE_FIREBASE_APP_ID: "1:1041749808643:web:f2a6fc0a10304cfe032036"
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: church-app-ec927
